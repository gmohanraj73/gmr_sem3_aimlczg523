name: mlops-heart-disease
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  # Data
  - pandas=2.2.2
  - numpy=1.26.4
  - scipy=1.13.1
  # ML
  - scikit-learn=1.5.0
  - xgboost=2.1.1
  - joblib=1.4.2
  # Visualisation
  - matplotlib=3.9.0
  - seaborn=0.13.2
  - plotly=5.22.0
  # Experiment Tracking
  - mlflow=2.14.1
  # API
  - fastapi=0.111.0
  - uvicorn=0.30.1
  - pydantic=2.7.4
  # Dataset download
  - pip
  - pip:
    - ucimlrepo==0.0.7
    - prometheus-fastapi-instrumentator==7.0.0
