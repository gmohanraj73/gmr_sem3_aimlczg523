name: MLOps CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run flake8
        run: flake8 src/ tests/
      - name: Run ruff check
        run: ruff check src/ tests/

  test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Download dataset, process, and train model
        run: |
          python data/download_data.py
          python src/data_processing.py
          python -m src.train
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-docker:
    name: Docker Build Validation
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      # The image COPYs models/, so the artifact must exist before docker build.
      - name: Install dependencies & train model
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
          python data/download_data.py
          python src/data_processing.py
          python -m src.train
      - name: Build Docker image
        run: docker build -t heart-disease-api:ci-test .
      - name: Smoke test container
        run: |
          docker run -d -p 8000:8000 --name test-api heart-disease-api:ci-test
          sleep 12
          curl --fail http://localhost:8000/health
          docker stop test-api
